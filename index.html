<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aikium Intelligence Brief — Factor 21 AI</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0A1628;
      --card:    #1E3A5F;
      --card-2:  #0F2236;
      --border:  #2D4F7A;
      --teal:    #0D9488;
      --teal-lo: rgba(13, 148, 136, 0.15);
      --teal-glow: rgba(13, 148, 136, 0.4);
      --text:    #F8FAFC;
      --muted:   #CBD5E1;
      --dim:     #64748B;
      --dimmer:  #334155;
      --red-bg:  rgba(239, 68, 68, 0.08);
      --red-border: rgba(239, 68, 68, 0.3);
      --red-text: #FCA5A5;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 48px 20px 100px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout ─── */
    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    /* ─── Header ─── */
    .header {
      text-align: center;
      margin-bottom: 44px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .powered-by {
      font-size: 11px;
      color: var(--teal);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .header h1 {
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 14px;
      line-height: 1.1;
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .header-rule .rule-line {
      flex: 1;
      max-width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal));
    }

    .header-rule .rule-line.right {
      background: linear-gradient(90deg, var(--teal), transparent);
    }

    .header-rule .rule-diamond {
      width: 6px;
      height: 6px;
      background: var(--teal);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .date-display {
      font-size: 12px;
      color: var(--dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ─── API Key ─── */
    .api-key-section {
      margin-bottom: 28px;
    }

    .field-label {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .api-key-input {
      width: 100%;
      padding: 13px 18px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .api-key-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
    }

    .api-key-input::placeholder { color: var(--dimmer); }

    /* ─── Generate Button ─── */
    .generate-btn {
      display: block;
      width: 100%;
      padding: 20px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 0 24px var(--teal-glow), 0 4px 20px rgba(0,0,0,0.4);
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }

    .generate-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .generate-btn:hover:not(:disabled) {
      background: #0f9f92;
      box-shadow: 0 0 38px var(--teal-glow), 0 4px 24px rgba(0,0,0,0.5);
      transform: translateY(-2px);
    }

    .generate-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .generate-btn:disabled {
      cursor: not-allowed;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px var(--teal-glow), 0 4px 20px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 50px rgba(13,148,136,0.7), 0 4px 24px rgba(0,0,0,0.5); }
    }

    .generate-btn.generating {
      animation: pulse-glow 1.8s ease-in-out infinite;
    }

    /* ─── Status Bar ─── */
    .status-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 13px;
    }

    .status-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }

    .dot {
      width: 5px;
      height: 5px;
      background: var(--teal);
      border-radius: 50%;
    }

    @keyframes dot-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-4px); opacity: 1; }
    }

    .dot:nth-child(1) { animation: dot-bounce 1.2s 0.0s infinite; }
    .dot:nth-child(2) { animation: dot-bounce 1.2s 0.15s infinite; }
    .dot:nth-child(3) { animation: dot-bounce 1.2s 0.3s infinite; }

    .status-text {
      flex: 1;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-text .search-tag {
      color: var(--teal);
      font-style: italic;
    }

    .token-counter {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      color: var(--dimmer);
      flex-shrink: 0;
    }

    /* ─── Section Cards ─── */
    @keyframes card-enter {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 26px 28px;
      margin-bottom: 20px;
      animation: card-enter 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .section-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 10.5px;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      flex: 1;
    }

    .section-content {
      font-size: 14px;
      line-height: 1.75;
      color: var(--muted);
    }

    .section-content ul {
      list-style: none;
      padding: 0;
    }

    .section-content li {
      padding: 10px 0 10px 22px;
      position: relative;
      border-bottom: 1px solid rgba(45, 79, 122, 0.35);
    }

    .section-content li:last-child { border-bottom: none; }

    .section-content li::before {
      content: '▸';
      position: absolute;
      left: 0;
      top: 12px;
      color: var(--teal);
      font-size: 11px;
      line-height: 1;
    }

    .section-content p {
      margin-bottom: 8px;
    }

    .section-content p:last-child { margin-bottom: 0; }

    /* Action items special styling */
    .section-card.action-items .section-content li {
      color: var(--text);
    }

    .section-card.action-items .section-content li::before {
      content: '→';
      color: var(--teal);
      font-size: 13px;
      top: 11px;
    }

    /* ─── Searching Indicator ─── */
    .search-card {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--teal-lo);
      border: 1px solid rgba(13, 148, 136, 0.25);
      border-radius: 8px;
      padding: 11px 16px;
      margin-bottom: 20px;
      font-size: 12px;
      color: var(--teal);
      letter-spacing: 0.03em;
    }

    .search-card .search-icon { font-size: 14px; }

    /* ─── Cursor ─── */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 15px;
      background: var(--teal);
      margin-left: 3px;
      vertical-align: middle;
      border-radius: 1px;
      animation: blink 1s step-end infinite;
    }

    /* ─── Complete Banner ─── */
    .complete-banner {
      display: none;
      text-align: center;
      padding: 14px 20px;
      margin-bottom: 22px;
      background: var(--teal-lo);
      border: 1px solid rgba(13, 148, 136, 0.3);
      border-radius: 8px;
      font-size: 13px;
      color: var(--teal);
      letter-spacing: 0.05em;
    }

    /* ─── Action Buttons ─── */
    .action-btns {
      display: none;
      gap: 12px;
      margin-bottom: 40px;
    }

    .action-btn {
      flex: 1;
      padding: 13px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .action-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-lo);
    }

    /* ─── Error Card ─── */
    .error-card {
      display: none;
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      border-radius: 8px;
      padding: 16px 18px;
      margin-bottom: 22px;
      font-size: 13px;
      color: var(--red-text);
      line-height: 1.6;
    }

    .error-card .error-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: #F87171;
    }

    /* ─── Empty placeholder ─── */
    .empty-placeholder {
      color: var(--dimmer);
      font-style: italic;
      font-size: 13px;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--dim); }

    /* ─── Print / PDF ─── */
    @media print {
      body {
        background: #fff !important;
        color: #111 !important;
        padding: 0 !important;
        font-size: 12px;
      }
      .header { border-bottom: 2px solid #0D9488; margin-bottom: 24px; padding-bottom: 16px; }
      .header h1 { color: #0A1628 !important; font-size: 22px; }
      .powered-by { color: #0D9488 !important; }
      .date-display { color: #555 !important; }
      .api-key-section,
      .generate-btn,
      .status-bar,
      .search-card,
      .error-card,
      .complete-banner,
      .action-btns,
      .header-rule { display: none !important; }
      .section-card {
        background: #f8fafc !important;
        border: 1px solid #cbd5e1 !important;
        border-radius: 8px;
        padding: 16px 18px;
        margin-bottom: 14px;
        break-inside: avoid;
        page-break-inside: avoid;
      }
      .section-title { color: #0D9488 !important; }
      .section-content { color: #1e293b !important; }
      .section-content li { border-bottom: 1px solid #e2e8f0 !important; }
      .section-content li::before { color: #0D9488 !important; }
      .section-card.action-items .section-content li::before { color: #0D9488 !important; }
      .complete-banner { display: none !important; }
      @page { margin: 18mm 16mm; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ─── Header ─── -->
  <div class="header">
    <div class="powered-by">Powered by Factor 21 AI</div>
    <h1>Aikium Intelligence Brief</h1>
    <div class="header-rule">
      <div class="rule-line"></div>
      <div class="rule-diamond"></div>
      <div class="rule-line right"></div>
    </div>
    <div class="date-display" id="dateDisplay"></div>
  </div>

  <!-- ─── API Key ─── -->
  <div class="api-key-section">
    <div class="field-label">Anthropic API Key</div>
    <input
      type="password"
      id="apiKeyInput"
      class="api-key-input"
      placeholder="sk-ant-api03-..."
      autocomplete="off"
      spellcheck="false"
      placeholder="sk-ant-api03-..."
    />
  </div>

  <!-- ─── Generate Button ─── -->
  <button id="generateBtn" class="generate-btn" onclick="generateBrief()">
    Generate Brief
  </button>

  <!-- ─── Status Bar ─── -->
  <div class="status-bar" id="statusBar">
    <div class="status-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status-text" id="statusText">Initializing...</div>
    <div class="token-counter" id="tokenCounter">0 words</div>
  </div>

  <!-- ─── Searching Indicator ─── -->
  <div class="search-card" id="searchCard">
    <span class="search-icon">🔍</span>
    <span id="searchLabel">Searching the web...</span>
  </div>

  <!-- ─── Error ─── -->
  <div class="error-card" id="errorCard">
    <div class="error-label">Error</div>
    <div id="errorMessage"></div>
  </div>

  <!-- ─── Brief Container ─── -->
  <div id="briefContainer"></div>

  <!-- ─── Complete Banner ─── -->
  <div class="complete-banner" id="completeBanner"></div>

  <!-- ─── Action Buttons ─── -->
  <div class="action-btns" id="actionBtns">
    <button class="action-btn" id="copyBtn" onclick="copyBrief()">Copy Brief</button>
    <button class="action-btn" onclick="savePdf()">Save as PDF</button>
    <button class="action-btn" onclick="regenerate()">Regenerate</button>
  </div>

</div>

<script>
  // ─── Section Config ───────────────────────────────────────────────────────────
  const SECTION_META = {
    'COMPETITIVE LANDSCAPE':      { icon: '⚔️',  cls: '' },
    'SCIENCE & PUBLICATIONS':     { icon: '🧬',  cls: '' },
    'PATENT ACTIVITY':            { icon: '📜',  cls: '' },
    'PHARMA PARTNERSHIP SIGNALS': { icon: '🤝',  cls: '' },
    'FUNDING & MARKET':           { icon: '📈',  cls: '' },
    "ESWAR'S ACTION ITEMS":       { icon: '🎯',  cls: 'action-items' },
  };

  const STATUS_MESSAGES = [
    'Scanning competitor pipelines...',
    'Pulling recent publications...',
    'Analyzing patent filings...',
    'Monitoring pharma BD signals...',
    'Reviewing funding & market activity...',
    "Compiling Eswar's action items...",
    'Synthesizing intelligence...',
    'Cross-referencing sources...',
    'Verifying recent developments...',
  ];

  // ─── State ───────────────────────────────────────────────────────────────────
  let fullText = '';
  let renderedSections = {};   // name → { card, contentDiv, finalized }
  let wordCount = 0;
  let startTime = null;
  let statusInterval = null;
  let statusIndex = 0;
  let isGenerating = false;
  let currentSearchQuery = '';
  let searchCount = 0;

  // ─── Init ─────────────────────────────────────────────────────────────────────
  const ANTHROPIC_KEY = '';
  const today = new Date();
  document.getElementById('dateDisplay').textContent = today.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // ─── Status Helpers ───────────────────────────────────────────────────────────
  function cycleStatus() {
    document.getElementById('statusText').textContent =
      STATUS_MESSAGES[statusIndex % STATUS_MESSAGES.length];
    statusIndex++;
  }

  function showStatusBar() {
    document.getElementById('statusBar').style.display = 'flex';
    cycleStatus();
    statusInterval = setInterval(cycleStatus, 3500);
  }

  function hideStatusBar() {
    document.getElementById('statusBar').style.display = 'none';
    if (statusInterval) { clearInterval(statusInterval); statusInterval = null; }
  }

  function showSearchCard(query) {
    const card = document.getElementById('searchCard');
    const label = document.getElementById('searchLabel');
    card.style.display = 'flex';
    label.innerHTML = query
      ? `Searching: <span class="search-tag">"${escapeHtml(query)}"</span>`
      : 'Searching the web...';
  }

  function hideSearchCard() {
    document.getElementById('searchCard').style.display = 'none';
  }

  function updateWordCount(delta) {
    wordCount += delta.split(/\s+/).filter(Boolean).length;
    document.getElementById('tokenCounter').textContent =
      wordCount.toLocaleString() + ' words';
  }

  // ─── Section Rendering ────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderContent(text) {
    const lines = text.split('\n');
    let html = '';
    let listItems = [];

    function flushList() {
      if (listItems.length === 0) return;
      html += '<ul>';
      for (const item of listItems) {
        html += `<li>${item}</li>`;
      }
      html += '</ul>';
      listItems = [];
    }

    for (const rawLine of lines) {
      const line = rawLine.trim();
      if (!line) continue;

      // Bullet point patterns: •, -, *, **bold**, numbered
      const bulletMatch = line.match(/^(?:[•\-\*]|\d+\.)\s+(.+)/);
      if (bulletMatch) {
        const content = bulletMatch[1]
          // bold: **text** or __text__
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>');
        listItems.push(content);
      } else {
        flushList();
        const content = line
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/__(.+?)__/g, '<strong>$1</strong>');
        html += `<p>${content}</p>`;
      }
    }

    flushList();

    if (!html.trim()) {
      return '<p class="empty-placeholder">Loading...</p>';
    }

    return html;
  }

  function getSectionKey(name) {
    return name.toLowerCase().replace(/[^a-z0-9]/g, '-');
  }

  function createSectionCard(sectionName) {
    const meta = SECTION_META[sectionName] || { icon: '📋', cls: '' };

    const card = document.createElement('div');
    card.className = 'section-card' + (meta.cls ? ' ' + meta.cls : '');
    card.id = 'section-' + getSectionKey(sectionName);

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <span class="section-icon">${meta.icon}</span>
      <div class="section-title">${escapeHtml(sectionName)}</div>
    `;

    const contentDiv = document.createElement('div');
    contentDiv.className = 'section-content';
    contentDiv.innerHTML = '<span class="cursor"></span>';

    card.appendChild(header);
    card.appendChild(contentDiv);
    document.getElementById('briefContainer').appendChild(card);

    // Smooth scroll to new card
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'end' }), 50);

    return { card, contentDiv, finalized: false };
  }

  function parseAndUpdateBrief() {
    // Split fullText by ===SECTION=== delimiters
    const parts = fullText.split(/===([^=\n]+)===/);
    // parts: [pre, name1, content1, name2, content2, ...]

    if (parts.length < 3) return; // No sections yet

    for (let i = 1; i < parts.length; i += 2) {
      const sectionName = parts[i].trim();
      const sectionContent = (i + 1 < parts.length) ? parts[i + 1] : '';
      const isLast = (i + 2 >= parts.length);

      if (!renderedSections[sectionName]) {
        // Finalize the previous section (remove cursor, render final content)
        const prevNames = Object.keys(renderedSections);
        if (prevNames.length > 0) {
          const prevName = prevNames[prevNames.length - 1];
          const prev = renderedSections[prevName];
          if (!prev.finalized) {
            // The previous section's content is parts[i-1]
            const prevContent = parts[i - 1] || '';
            prev.contentDiv.innerHTML = renderContent(prevContent);
            prev.finalized = true;
          }
        }

        renderedSections[sectionName] = createSectionCard(sectionName);
      }

      // Only update the last (active) section on every delta
      if (isLast && !renderedSections[sectionName].finalized) {
        renderedSections[sectionName].contentDiv.innerHTML =
          renderContent(sectionContent) + '<span class="cursor"></span>';
      }
    }
  }

  // ─── Main Generate Function ───────────────────────────────────────────────────
  const MAX_RETRIES = 3;

  async function generateBrief() {
    if (isGenerating) return;

    const apiKey = document.getElementById('apiKeyInput').value.trim() || ANTHROPIC_KEY;

    // Reset UI
    isGenerating = true;
    fullText = '';
    renderedSections = {};
    wordCount = 0;
    startTime = Date.now();
    searchCount = 0;
    statusIndex = 0;

    document.getElementById('briefContainer').innerHTML = '';
    document.getElementById('errorCard').style.display = 'none';
    document.getElementById('completeBanner').style.display = 'none';
    document.getElementById('actionBtns').style.display = 'none';
    document.getElementById('tokenCounter').textContent = '0 words';

    const btn = document.getElementById('generateBtn');
    btn.textContent = 'GENERATING...';
    btn.disabled = true;
    btn.classList.add('generating');

    showStatusBar();

    const todayStr = today.toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    const systemPrompt = `You are an elite biotech intelligence analyst embedded at Aikium Inc., a pioneering AI + synthetic biology company targeting the undruggable proteome. Aikium's platform (Yotta-ML2) operates at 10²⁴ scale using protein language models and wet lab synthesis. Their targets: intrinsically disordered proteins (IDPs), GPCRs, and ion channels — areas where traditional antibodies and small molecules fail.

Your job: produce a concise, high-signal weekly intelligence brief for Dr. Eswar Iyer, Aikium's CEO. No fluff. No filler. Only information that a PhD scientist running a pre-Series A biotech would find immediately actionable.

Use your web search tool extensively — search for each section topic separately to get current information. Search for competitor names directly, search for recent IDP/GPCR publications, search for relevant patent filings, search pharma pipeline news. Read the actual pages, not just snippets.

Format your output using EXACTLY these section delimiters so the frontend can parse them:
===COMPETITIVE LANDSCAPE===
===SCIENCE & PUBLICATIONS===
===PATENT ACTIVITY===
===PHARMA PARTNERSHIP SIGNALS===
===FUNDING & MARKET===
===ESWAR'S ACTION ITEMS===

Under each section write 3-6 substantive bullet points. Each bullet should be 2-4 sentences with a specific finding, why it matters to Aikium, and a source or company name. Be direct. Be specific. No generic statements.`;

    const userMessage = `Generate this week's Aikium intelligence brief. Today's date is ${todayStr}. Search thoroughly across all six sections. This will be reviewed by Aikium's CEO so make it sharp.`;

    const payload = JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 8000,
      stream: true,
      system: systemPrompt,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: userMessage }],
    });

    // ─── Retry loop ────────────────────────────────────────────────────────────
    for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
      try {
        if (attempt > 1) {
          // Reset accumulated content for clean retry
          fullText = '';
          renderedSections = {};
          wordCount = 0;
          document.getElementById('briefContainer').innerHTML = '';
          document.getElementById('tokenCounter').textContent = '0 words';
          document.getElementById('statusText').textContent =
            `Retrying... (attempt ${attempt} of ${MAX_RETRIES})`;
          await new Promise(r => setTimeout(r, 1500));
          cycleStatus();
        }

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-beta': 'web-search-2025-03-05',
          'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: payload,
        });

        if (!response.ok) {
          let errMsg = `API error: HTTP ${response.status}`;
          try {
            const errData = await response.json();
            errMsg = `API error ${response.status}: ${errData.error?.message || JSON.stringify(errData)}`;
          } catch (_) {}
          throw new Error(errMsg);
        }

        // ─── Stream processing ────────────────────────────────────────────────
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let lineBuf = '';
        let inToolUse = false;
        let toolInputBuffer = '';

        outer: while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          lineBuf += decoder.decode(value, { stream: true });
          const lines = lineBuf.split('\n');
          lineBuf = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const raw = line.slice(6).trim();
            if (!raw || raw === '[DONE]') continue;

            let event;
            try { event = JSON.parse(raw); } catch (_) { continue; }

            switch (event.type) {
              case 'content_block_start': {
                const block = event.content_block;
                if (block?.type === 'server_tool_use' || block?.type === 'tool_use') {
                  inToolUse = true;
                  toolInputBuffer = '';
                  currentSearchQuery = '';
                  showSearchCard('');
                }
                break;
              }
              case 'content_block_delta': {
                const delta = event.delta;
                if (!delta) break;
                if (delta.type === 'text_delta' && delta.text) {
                  fullText += delta.text;
                  updateWordCount(delta.text);
                  parseAndUpdateBrief();
                } else if (delta.type === 'input_json_delta' && inToolUse) {
                  toolInputBuffer += delta.partial_json || '';
                  try {
                    const parsed = JSON.parse(toolInputBuffer);
                    if (parsed.query && parsed.query !== currentSearchQuery) {
                      currentSearchQuery = parsed.query;
                      showSearchCard(currentSearchQuery);
                    }
                  } catch (_) {
                    const qMatch = toolInputBuffer.match(/"query"\s*:\s*"([^"]+)/);
                    if (qMatch && qMatch[1] !== currentSearchQuery) {
                      currentSearchQuery = qMatch[1];
                      showSearchCard(currentSearchQuery);
                    }
                  }
                }
                break;
              }
              case 'content_block_stop': {
                if (inToolUse) {
                  inToolUse = false;
                  searchCount++;
                  try {
                    const p = JSON.parse(toolInputBuffer);
                    if (p.query) showSearchCard(p.query);
                  } catch (_) {}
                  setTimeout(hideSearchCard, 1200);
                  toolInputBuffer = '';
                }
                break;
              }
              case 'message_stop':
                break outer;
            }
          }
        }

        // Stream completed cleanly
        onComplete();
        return; // ← success, exit retry loop

      } catch (err) {
        const isLast = attempt === MAX_RETRIES;
        console.warn(`[brief] attempt ${attempt} failed:`, err.message);

        if (isLast) {
          // All retries exhausted — show what we have or error
          if (fullText.trim().length > 0) {
            onComplete(true);
          } else {
            onError(new Error(`Failed after ${MAX_RETRIES} attempts. Check your connection and try again.`));
          }
        }
        // else: loop continues to next attempt
      }
    }
  }

  // ─── Completion ───────────────────────────────────────────────────────────────
  function onComplete(partial = false) {
    isGenerating = false;

    // Remove all cursors
    document.querySelectorAll('.cursor').forEach(c => c.remove());

    // Finalize last section (ensure no cursor remains in content)
    const sectionNames = Object.keys(renderedSections);
    if (sectionNames.length > 0) {
      const last = sectionNames[sectionNames.length - 1];
      const s = renderedSections[last];
      if (!s.finalized) {
        // Re-render without cursor
        const parts = fullText.split(/===([^=\n]+)===/);
        for (let i = 1; i < parts.length; i += 2) {
          if (parts[i].trim() === last && i + 1 < parts.length) {
            s.contentDiv.innerHTML = renderContent(parts[i + 1]);
            s.finalized = true;
            break;
          }
        }
      }
    }

    hideStatusBar();
    hideSearchCard();

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    const sectionCount = Object.keys(renderedSections).length;

    const banner = document.getElementById('completeBanner');
    banner.innerHTML = partial
      ? `⚠ Connection dropped — ${sectionCount} sections captured &nbsp;·&nbsp; ${wordCount.toLocaleString()} words &nbsp;·&nbsp; Hit Regenerate to complete`
      : `✓ Brief complete &nbsp;·&nbsp; ${sectionCount} sections &nbsp;·&nbsp; ${wordCount.toLocaleString()} words &nbsp;·&nbsp; generated in ${elapsed}s`;
    banner.style.display = 'block';

    document.getElementById('actionBtns').style.display = 'flex';

    // Scroll to top of brief
    document.getElementById('briefContainer').scrollIntoView({ behavior: 'smooth', block: 'start' });

    const btn = document.getElementById('generateBtn');
    btn.textContent = 'GENERATE BRIEF';
    btn.disabled = false;
    btn.classList.remove('generating');
  }

  // ─── Error ────────────────────────────────────────────────────────────────────
  function onError(err) {
    isGenerating = false;
    hideStatusBar();
    hideSearchCard();

    document.querySelectorAll('.cursor').forEach(c => c.remove());

    showError(err.message || 'An unknown error occurred. Check the console for details.');

    const btn = document.getElementById('generateBtn');
    btn.textContent = 'GENERATE BRIEF';
    btn.disabled = false;
    btn.classList.remove('generating');
  }

  function showError(msg) {
    const card = document.getElementById('errorCard');
    document.getElementById('errorMessage').textContent = msg;
    card.style.display = 'block';
  }

  // ─── Copy ─────────────────────────────────────────────────────────────────────
  function copyBrief() {
    const btn = document.getElementById('copyBtn');
    navigator.clipboard.writeText(fullText.trim()).then(() => {
      btn.textContent = 'COPIED ✓';
      setTimeout(() => { btn.textContent = 'Copy Brief'; }, 2200);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = fullText.trim();
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.textContent = 'COPIED ✓';
      setTimeout(() => { btn.textContent = 'Copy Brief'; }, 2200);
    });
  }

  // ─── Save as PDF ─────────────────────────────────────────────────────────────
  function savePdf() {
    const title = document.title;
    document.title = `Aikium Intelligence Brief — ${today.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`;
    window.print();
    document.title = title;
  }

  // ─── Regenerate ───────────────────────────────────────────────────────────────
  function regenerate() {
    document.getElementById('briefContainer').innerHTML = '';
    document.getElementById('completeBanner').style.display = 'none';
    document.getElementById('actionBtns').style.display = 'none';
    document.getElementById('errorCard').style.display = 'none';
    generateBrief();
  }

  // ─── Enter key on API key field ───────────────────────────────────────────────
  document.getElementById('apiKeyInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') generateBrief();
  });
</script>
